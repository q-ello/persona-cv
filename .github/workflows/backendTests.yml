name: Backend Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend
        
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm install
      - run: npm test

      env:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          NOTION_OBJECTIVES_DATASOURCE_ID: ${{ secrets.NOTION_OBJECTIVES_DATASOURCE_ID }}
          GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          GOOGLE_COMMON_CALENDAR_ID: ${{ secrets.GOOGLE_COMMON_CALENDAR_ID }}
          GOOGLE_DEADLINES_CALENDAR_ID: ${{ secrets.GOOGLE_DEADLINES_CALENDAR_ID }}
